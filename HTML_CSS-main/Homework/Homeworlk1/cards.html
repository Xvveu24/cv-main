<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Card game</title>
    <style>
        body {
            background: #0d1b2a;
            font-family: Arial, sans-serif;
            padding: 40px;
        }

        .player {
            margin-bottom: 20px;
        }

        .player-label {
            font-size: 15px;
            color: #a8dadc;
            text-shadow: 2px 2px 7px black;
            margin-bottom: 8px;
        }

        .cards-row {
            display: flex;
            gap: 8px;
        }

        .card {
            background: #e8f1f2;
            border: 1px solid #457b9d;
            border-radius: 5px;
            width: 58px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .red { color: #e63946; }
        .black { color: #1d3557; }

        .cont {
            background: #1d3557;
            max-width: 680px;
            margin: 0 auto;
            text-align: center;
            padding: 38px 42px;
            border-radius: 16px;
            box-shadow: 2px 1px 7px black;
        }
    </style>
</head>
<body>

<div class ="cont">
    <div class="player">
        <div class="player-label">Player 1:</div>
        <div class="cards-row">         
            <div class="card black">2&spades;</div>
            <div class="card red">9&hearts;</div>
            <div class="card red">6&hearts;</div>
            <div class="card red">A&diams;</div>
            <div class="card black">Q&spades;</div>
            <div class="card black">J&clubs;</div>
        </div>
    </div>

    <div class="player">
        <div class="player-label">Player 2:</div>
        <div class="cards-row">
            <div class="card red">3&hearts;</div>
            <div class="card black">A&clubs;</div>
            <div class="card black">10&clubs;</div>
            <div class="card red">K&diams;</div>
            <div class="card black">8&spades;</div>
            <div class="card red">3&hearts;</div>
        </div>
    </div>
</div>

</body>
</html>
