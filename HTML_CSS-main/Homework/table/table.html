<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Sticky Table</title>

<style>
div {
  max-height: 80vh;
  overflow: auto;
}

table {
  border-collapse: collapse;
  width: 900px;
  font-family: Arial, sans-serif;
}

th, td {
  border: 1px solid #d0d0d0;
  padding: 10px;
  text-align: center;
  min-width: 120px;
}

thead th {
  position: sticky;
  top: 0;
  background: #a9d6e5;
  z-index: 3;
}

th:first-child,
td:first-child {
  position: sticky;
  left: 0;
  background: #a9d6e5;
  z-index: 2;
  font-weight: bold;
}

thead th:first-child {
  z-index: 4;
}

tbody tr:nth-child(even) td {
  background: #eeeeee;
}

tbody tr:nth-child(even) td:first-child,
tbody tr:nth-child(odd) td:first-child {
  background: #a9d6e5;
}
</style>
</head>

<body>

<div>
<table>
  <thead>
    <tr>
      <th>Line</th>
      <th>Header 1</th>
      <th>Header 2</th>
      <th>Header 3</th>
      <th>Header 4</th>
      <th>Header 5</th>
    </tr>
  </thead>

  <tbody>
    <tr><td>Line 1</td><td>23</td><td>123</td><td>43</td><td>12</td><td>76</td></tr>
    <tr><td>Line 2</td><td>23</td><td>123</td><td>43</td><td>12</td><td>76</td></tr>
    <tr><td>Line 3</td><td>34</td><td>63</td><td>25</td><td>7</td><td>23</td></tr>
    <tr><td>Line 4</td><td>23</td><td>23</td><td>23</td><td>23</td><td>23</td></tr>
    <tr><td>Line 5</td><td>23</td><td>23</td><td>23</td><td>23</td><td>23</td></tr>
    <tr><td>Line 6</td><td>23</td><td>23</td><td>23</td><td>23</td><td>23</td></tr>
    <tr><td>Line 7</td><td>23</td><td>23</td><td>23</td><td>23</td><td>23</td></tr>
    <tr><td>Line 8</td><td>23</td><td>23</td><td>23</td><td>23</td><td>23</td></tr>
  </tbody>
</table>
</div>

</body>
</html>
