<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Progress Bar</title>
  <style>
    * { 
     box-sizing: border-box; 
     margin: 0; 
     padding: 0; 
   }

    body { 
     display: flex; 
     justify-content: center; 
     align-items: center; 
     height: 100vh; 
    }

    .bar {
      width: 400px;
      height: 40px;
      border: 3px solid orange;
      overflow: hidden;
    }

    .laod {
      width: 80px;
      height: 100%;
      background: orange;
      animation: move 2s linear infinite;
    }

    @keyframes move {
      from { transform: translateX(-80px); }
      to   { transform: translateX(400px); }
    }

  </style>
</head>
<body>

  <div class="bar">
    <div class="laod"></div>
  </div>

</body>
</html>
