<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Cats Gallery</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            padding: 30px;
        }

        .box {
            background-color: #fff;
            border: 2px solid #ccc;
            padding: 20px;
            width: 500px;
        }

        h1 {
            text-align: center;
            font-size: 1.2em;
        }

        iframe {
           width: 100%;
           height: 300px;
           border: 2px solid #ccc;
           display: block;
           margin: 0 auto;
         }        

        .small {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .small a img {
            width: 70px;
            height: 70px;
            border: 2px solid #ccc;
        }

        .small a img:hosver {
            border-color: #888;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>CATS GALLERY</h1>

        <iframe src="materials/cat_box_256.png" name="big"></iframe>

        <div class="small">
            <a href="./materials/cat_box_256.png" target="big"><img src="materials/cat_box_64.png" alt="box"></a>
            <a href="materials/cat_cage_256.png" target="big"><img src="materials/cat_cage_64.png" alt="cage"></a>
            <a href="materials/cat_clean_256.png" target="big"><img src="materials/cat_clean_64.png" alt="clean"></a>
            <a href="materials/cat_eyes_256.png" target="big"><img src="materials/cat_eyes_64.png" alt="eyes"></a>
            <a href="materials/cat_purr_256.png" target="big"><img src="materials/cat_purr_64.png" alt="purr"></a>
            <a href="materials/cat_tied_256.png" target="big"><img src="materials/cat_tied_64.png" alt="tied"></a>
        </div>
    </div>

</body>
</html>
