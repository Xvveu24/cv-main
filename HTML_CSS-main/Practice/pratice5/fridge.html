<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Fridge</title>
  <style>

    * { 
     box-sizing: border-box; 
     margin: 0; 
     padding: 0; 
    }

    body { 
     font-family: Arial, sans-serif; 
     text-align: center; 
     padding: 20px; 
    }

    h2 { 
     margin-bottom: 20px; 
    }

    .list {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    .item {
      width: 120px;
      border: 1px solid #ccc;
      padding: 10px;
      text-align: center;
    }

    .item img {
      width: 80px;
      height: 80px;
      object-fit: contain;
    }

    .item p {
      margin-top: 8px;
      font-size: 14px;
    }

    .footer { 
     margin-top: 20px;
     font-style: italic; 
    }

    hr {
    border: none;
    background-color: #333;
    color: #333;
    height: 2px;
   
}

  </style>
</head>
<body>

  <h2>What do I have in my fridge?</h2>

  <div class="list">
    <div class="item">
      <img src="Food_C247-128.png" alt="Pepper">
      <p>Pepper</p>
    </div>

    <div class="item">
      <img src="Food_C240-128.png" alt="Apple">
      <p>Apple</p>
    </div>

    <div class="item">
      <img src="Food_C217-128.png" alt="Cheese">
      <p>Cheese</p>
    </div>

    <div class="item">
      <img src="Food_C245-128.png" alt="Corn">
      <p>Corn</p>
    </div>

    <div class="item">
      <img src="Food_C239-128.png" alt="Mushroom">
      <p>Mushroom</p>
    </div>
    
    <div class="item">
      <img src="Food_C238-128.png" alt="Garlic">
      <p>Garlic</p>
    </div>

    <div class="item">
      <img src="Food_C225-128.png" alt="Beef">
      <p>Beef</p>
    </div>

    <div class="item">
      <img src="Food_C205-128.png" alt="Fish">
      <p>Fish</p>
    </div>

    <div class="item">
      <img src="Food_C203-128.png" alt="Eggs">
      <p>Eggs</p>
    </div>

    <div class="item">
      <img src="Food_C235-128.png" alt="Coriander">
      <p>Coriander</p>
    </div>

  </div>

  <br>
  <hr>

  <p class="footer">... that's all ...</p>

</body>
</html>
