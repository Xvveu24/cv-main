<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Menu</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body { font-family: Arial, sans-serif; }

    nav { width: 250px; }

    nav a {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 18px 20px;
      background: #5a6474;
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 1px;
      border-bottom: 1px solid #4a5464;
    }

    nav a:hover { background: #3a4454; }

    nav a img {
      width: 32px;
      height: 32px;
      object-fit: contain;
    }
  </style>
</head>
<body>

  <nav>
    <a href="#"><img src="edit.png" alt="Edit">EDIT</a>
    <a href="#"><img src="favorites.png" alt="Favorites">FAVORITES</a>
    <a href="#"><img src="history.png" alt="History">HISTORY</a>
    <a href="#"><img src="security.png" alt="Security">SECURITY</a>
    <a href="#"><img src="settings.png" alt="Settings">SETTINGS</a>
  </nav>

</body>
</html>
