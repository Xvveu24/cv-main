<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .grid-container{
            width: 80vw;
            margin: 1.3em auto;
            padding: 1.1em;
            background-color: cadetblue;
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 0.2em 1.1em;
        }

        .grid-container div {
            width: 100%;
            height: 5vw;
            background-color: beige;
            border: darkslategray solid 2px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
        }
        .grid-container div:nth-child(1){
            /* grid-column-start: 1;
            grid-column-end: 4; */
            /* grid-column: 1/span 3;
            grid-row: 1 /span 2; */

            grid-area: 1 / 1 / 3 / 4;
        }

        .grid-container div:nth-child(2){
            grid-area: 1/ 4 /5 / 5;
        }

    </style>
</head>
<body>

    <div class="grid-container">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
        <div>7</div>
        <div>8</div>
    </div>
    
</body>
</html>
