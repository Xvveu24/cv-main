<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
        }


        .grid-container{
            width: 80vw;
            margin: 1.3em auto;
            padding: 1.1em;
            background-color: cadetblue;
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 0.2em 1.1em;
        }



        .container{
            margin: 1.1em auto;
            padding: 0.6em;
            display: grid;
            grid-template-columns: 1fr 3fr 1fr;
            grid-template-areas: 10vh 1fr 5vh;
            grid-template-areas: 
            'header' 'header' 'header'
            'menu' 'main' 'right'
            'footer' 'foote' 'footer';

        }

        .container div{
            background-color: beige;
            border: cadetblue solid 2px;
        }

        .header{
            grid-area: header;
            display: flex;
            padding-left: 0.7em;
            gap:0.4em
        }

        .header div {
            border: none;
            text-transform: uppercase;
            font-family: Arial, Helvetica, sans-serif;
        }

        .header div:hover {
            text-shadow: 2px 2px 15px black;
        }

        .header div:nth-child(3) {
            margin-left: auto;
        }

        .menu{
            grid-area: menu;
        }

        .main{
            grid-area: main;
        }

        .right{
            grid-area: right;
        }

        .footer{
            grid-area:footer;
        }
        
        .logout{
        
        }
    </style>
</head>
<body>

    <div class="conatiner">
        <div class ="header"> 
            <div> Home</div>
            <div> Search</div>
            <div> <a href="https://www.google.com/"> log out</a></div>
        </div>
        <div class="menu"> Menu</div>
        <div class="main"> Main</div>
        <div class="right"> Right</div>
        <div class="footer"> Footer</div>
    </div>
    
</body>
</html>
