<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        img {
            width: 150px;
            box-shadow: 2px 2px 15px black;
        }

        .container {
            background-color: cadetblue;
            border: coral 1px solid;
            border-radius: 15px;
            margin: 2em;
            padding: 1.5em;

            display: flex;
            justify-content: space-evenly;
            align-items: center;
            flex-direction: row;
            flex-wrap: wrap;

            gap: 1.5em;
            height: auto;


        
        }

        .flex-elm{
            width: 150px;
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
        }

        .elm1{
            background-color: green;
            flex-grow: 1;
            /* order: 4; */

        }

        .elm2{
            background-color: blue;
            /* order: 4; */
            flex-grow: 2;

        }
        .elm3{
            background-color: yellow;
            /* order: 2; */
            flex-grow: 2;
        }
        .elm4{
            background-color: red;
            /* order: 1; */
            flex-grow: 1;
        }
    </style>
</head>
<body>
  <div class="container">

    <div class="flex-elm elm1">1</div>
    <div class="flex-elm elm2">2</div>
    <div class="flex-elm elm3">3</div>
    <div class="flex-elm elm4">4</div>
    
    <!-- <img src="/Lessons/Lesson2/Lesson4/shared_resources//icon.png" alt="">
    <img src="/Lessons/Lesson2/Lesson4/shared_resources//icon.png" alt="">
    <img src="/Lessons/Lesson2/Lesson4/shared_resources//icon.png" alt=""> -->
  </div>
    
</body>
</html>
