    <title>Document</title>
    <style>

        *{ margin:0;
        background-color: blanchedalmond;}

        .img_container {
            border:solid cadetblue 5px;
            text-align: center;
            padding: 10px;

        }
        img{
            width: 10%;
            height:auto;
            border-radius: 15px;
            transition: all 0.4s ease 0s;
        }

        img:hover {
            width: 20%;
            box-shadow: 5px 5px 10px black;
        }

        a:link {
            color:blue;
        }

        a:visited {
            color:rgba(129, 4, 179, 0.418);
            text-decoration: underline;
        }

        a:focus {
            color:crimson;
        }

        a:active {
            color:bisque;
        }

        h1 {
            text-align:center;
        }

        .button:hover {
            background-color: rgba(129, 4, 179, 0.418);
            border-color: rgb(67,42,16);
            
        }

        .button{
            width:30% ;
            padding: 10px 0;
            margin: auto;
            text-align: center;
            border: solid red 1px;
            background-color: red;
            border-radius: 10px;
            transition-property: all;
            transition-duration: 0.8s;
            transition-timing-function: cubic-bezier(0.15,0.39, 0.38,0.94);
            transition-delay: 0;
        }

        .button a{
            background-color: transparent;
            color:black
        }

       
 .transform-example{
            margin: 10px;
            padding:10px 50%;
            height:auto;
            
            border:solid cadetblue 5px;
        }
        .square{
            width: 50px;
            height:50px;
            margin: 15px,auto;
            background-color: black;
            transition: all 2s ease 0s;;
        }

        

        .translate-example:hover {
            transform: translate(125px,0px);
            
        }

        .scale-example:hover {
            transform: scale(2,0.5)
        }

        img:hover {
            transform: rotateY(180deg);
            
        }

        .rotate2d {
            transform-origin: 100% 100%;
        }

        .rotate2d:hover {
            transform: rotateX(60deg)

        }

        .rotate3dx:hover {
        transform: rotateX(60deg)
        }

        .rotate3dY:hover {
            transform: rotateX(60deg)

        }

        .rotate3dZ:hover {
        transform: rotateX(60deg)
        }

        .animations {
            width: 80%;
            height:500px;
            text-align: center;
            box-sizing: border-box;
            margin: 5px;
            border:solid cadetblue 5px;
            
        }

        .circle {
            height:50px;
            width:50px;
            background-color: darkcyan;
            border-radius: 50%;
            padding:10px, 10px;

            animation: circle-anim;
            animation-duration: 1s;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
            
        }

        @keyframes circle-anim {
            0% {
                transform: translate(0,0);
            }

            25% {
                transform: translate(200px,0);
            }
            50% {
                transform:translate(200px,400px);
            }
            75% {
                transform: translate(0,400px)
            }

            100% {
                transform: translate(0,0)
            }
        }
        
    </style>
</head>
<body>
    <h1 > Hyperlinks: The Connective Tissue of the Digital World</h1>

    <div class="animations">
        <div class="circle"></div>
    </div>

    <div class="transform-example" >
        
        <div class="translate-example square"> </div>
        <div class="scale-example square"> </div>
        <div class="rotate2d square"> </div>
        <div class="rotated3dx square"> </div>
        <div class="rotate3dY square"> </div>
        <div class="rotate3dZ square"> </div>
    </div>
