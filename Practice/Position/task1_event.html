<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Page</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 20px;
    }

    .breadcrumb {
      font-size: 12px;
      color: #888;
      margin-bottom: 20px;
    }

    .page {
      background: #2a5c6e;
      padding: 30px;
      color: #fff;
    }

    .title {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .info {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
    }

    .author-block {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #aaa;
    }

    .author-name {
      font-size: 13px;
      font-weight: bold;
    }

    .author-label {
      font-size: 11px;
      color: #ccc;
    }

    .meta-item {
      font-size: 13px;
    }

    .meta-label {
      font-size: 11px;
      color: #ccc;
      margin-bottom: 2px;
    }

  
    @media (max-width: 599px) {
      .page {
        padding: 20px;
      }

      .title {
        font-size: 22px;
      }

      .info {
        flex-direction: column;
        gap: 14px;
      }
    }
  </style>
</head>
<body>

  <div class="breadcrumb">Home / Articles /</div>

  <div class="page">
    <div class="title">The Difference Between Responsive and Adaptive Design</div>
    <div class="info">
      <div class="author-block">
        <img class="avatar" src="icons_hw/account.png" alt="">
        <div>
          <div class="author-label">Author</div>
          <div class="author-name">Geoff Graham</div>
        </div>
      </div>
      <div class="meta-item">
        <div class="meta-label">49 Comments</div>
        <div>Go to comments</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Published</div>
        <div>Nov 11, 2018</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Updated</div>
        <div>Nov 17, 2018</div>
      </div>
    </div>
  </div>

</body>
</html>
