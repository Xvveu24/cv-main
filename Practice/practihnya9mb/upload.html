<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Upload</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #f0f0f0;
      padding: 20px;
    }

    .blok {
      background: #fff;
      padding: 16px;
      max-width: 700px;
      display: flex;
      gap: 16px;
      align-items: flex-start;
      box-shadow: 1px 1px 6px black;
    }

    .img-blok {
      width: 160px;
      flex-shrink: 0;
    }

    .img-blok img {
      width: 100%;
      display: block;
    }

    .txt {
      flex: 1;
    }

    .bar-row {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
    }

    .bar {
      flex: 1;
      height: 22px;
      background: #ddd;
      position: relative;
    }

    .bar-fill {
      width: 40%;
      height: 100%;
      background: #4a90d9;
    }

    .bar span {
      position: absolute;
      left: 8px;
      top: 3px;
      font-size: 11px;
      font-weight: bold;
      color: #fff;
    }

    .time {
      background: #f5f5f5;
      border: 1px solid #ccc;
      border-left: none;
      padding: 3px 10px;
      font-size: 11px;
      height: 22px;
      display: flex;
      align-items: center;
    }

    .btn {
      background: #4a90d9;
      color: #fff;
      border: none;
      padding: 4px 14px;
      font-size: 12px;
      cursor: pointer;
      height: 22px;
      margin-left: -1px;
    }

    .title {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .note {
      font-size: 11px;
      color: #888;
    }

    @media (max-width: 599px) {
      .blok {
        flex-direction: column;
      }

      .img-blok {
        width: 100%;
      }

      .bar-row {
        flex-wrap: wrap;
        gap: 4px;
      }

      .time {
        border-left: 1px solid #ccc;
      }

      .btn {
        width: 100%;
        margin-left: 0;
        margin-top: 6px;
        height: 30px;
      }
    }
  </style>
</head>
<body>

  <div class="blok">
    <div class="img-blok">
      <img src="six_seven/loading.png" alt="loading">
    </div>
    <div class="txt">
      <div class="bar-row">
        <div class="bar">
          <div class="bar-fill"></div>
          <span>UPLOADING 40%</span>
        </div>
        <div class="time">About 23 minutes remaining</div>
        <button class="btn">DONE</button>
      </div>
      <div class="title">Title of video</div>
      <div class="note">* Your video is still uploading. Please keep this page open until it's done.</div>
    </div>
  </div>

</body>
</html>
